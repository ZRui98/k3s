apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authelia
  namespace: authelia
spec:
  chart:
    spec:
      chart: authelia
      sourceRef:
        kind: HelmRepository
        name: authelia
        namespace: flux-system
      version: ">=0.9.0"
  interval: 24h
  timeout: 10m
  releaseName: authelia
  targetNamespace: authelia
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  driftDetection:
    mode: enabled
  values:
    ingress:
      enabled: false

    pod:
      replicas: 1
      # /config holds the SQLite DB — not persistent across pod restarts (sessions lost on restart)
      extraVolumes:
        - name: authelia-data
          emptyDir: {}
      extraVolumeMounts:
        - name: authelia-data
          mountPath: /config

    configMap:
      authentication_backend:
        password_reset:
          disable: true
        refresh_interval: 1m
        file:
          enabled: true
          # Mounted from the authelia-users additionalSecret below
          path: /secrets/authelia-users/users_database.yml

      access_control:
        default_policy: deny
        rules:
          - domain: 'auth.zrui.dev'
            policy: bypass
          - domain:
              - '*.zrui.dev'
              - '*.k8s.zrui.dev'
            policy: one_factor

      session:
        encryption_key:
          # Resolved to /secrets/authelia-secret/SESSION_ENCRYPTION_KEY
          path: SESSION_ENCRYPTION_KEY
        cookies:
          - domain: zrui.dev
            subdomain: auth
            name: authelia_session
            same_site: lax
            inactivity: 5m
            expiration: 1h
            remember_me: 1M

      storage:
        local:
          enabled: true
          path: /config/db.sqlite3
        encryption_key:
          # Resolved to /secrets/authelia-secret/STORAGE_ENCRYPTION_KEY
          path: STORAGE_ENCRYPTION_KEY

      notifier:
        disable_startup_check: false
        filesystem:
          enabled: true
          filename: /tmp/notification.txt

      identity_validation:
        reset_password:
          secret:
            # Resolved to /secrets/authelia-secret/JWT_HMAC_KEY
            path: JWT_HMAC_KEY

    secret:
      # Mount this K8s secret at /secrets/authelia-secret/
      existingSecret: authelia-secret
      # Mount the authelia-users secret at /secrets/authelia-users/
      additionalSecrets:
        authelia-users:
          items:
            - key: users_database.yml
              path: users_database.yml
