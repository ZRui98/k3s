apiVersion: operator.victoriametrics.com/v1beta1
kind: VMSingle
metadata:
  name: vm-single
  namespace: vm
spec:
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 1
        preference:
          matchExpressions:
          - key: type
            operator: In
            values:
            - storage
  retentionPeriod: "12w"
  removePvcAfterDelete: true
  storage:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 10Gi
  extraArgs:
    dedup.minScrapeInterval: 60s
    vmui.customDashboardsPath: /dashboards
  volumes:
    - name: dashboards
      configMap:
        name: vmui-dashboards
  volumeMounts:
    - name: dashboards
      mountPath: /dashboards
  resources:
    requests:
      memory: "500Mi"
      cpu: "250m"
    limits:
      memory: "4Gi"
      cpu: "500m"
