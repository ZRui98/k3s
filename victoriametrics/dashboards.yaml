apiVersion: v1
kind: ConfigMap
metadata:
  name: vmui-dashboards
  namespace: vm
data:
  flux-reconciliation.json: |
    {
      "title": "Flux Reconciliation",
      "rows": [
        {
          "title": "Status",
          "panels": [
            {
              "title": "Not Ready",
              "type": "stat",
              "expr": ["count(gotk_reconcile_condition{type=\"Ready\",status=\"False\"}) or vector(0)"]
            },
            {
              "title": "Stalled",
              "type": "stat",
              "expr": ["count(gotk_reconcile_condition{type=\"Stalled\",status=\"True\"}) or vector(0)"]
            },
            {
              "title": "Suspended",
              "type": "stat",
              "expr": ["count(gotk_suspend_status{suspended=\"true\"}) or vector(0)"]
            }
          ]
        },
        {
          "title": "Failures Over Time",
          "panels": [
            {
              "title": "Resources Not Ready",
              "type": "chart",
              "expr": ["gotk_reconcile_condition{type=\"Ready\",status=\"False\"}"]
            }
          ]
        },
        {
          "title": "Reconciliation Rate",
          "panels": [
            {
              "title": "Reconcile Errors per Minute",
              "type": "chart",
              "expr": ["sum(rate(gotk_reconcile_total{success=\"false\"}[5m])) by (kind, name, exported_namespace)"]
            },
            {
              "title": "Reconcile Duration (p99)",
              "type": "chart",
              "expr": ["histogram_quantile(0.99, sum(rate(gotk_reconcile_duration_seconds_bucket[5m])) by (le, kind, name))"],
              "unit": "seconds"
            }
          ]
        }
      ]
    }
  system-metrics.json: |
    {
      "title": "System Metrics",
      "rows": [
        {
          "title": "Node CPU",
          "panels": [
            {
              "title": "CPU Usage % by Node",
              "type": "chart",
              "expr": ["100 - (avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)"],
              "unit": "percent"
            },
            {
              "title": "CPU Steal % by Node",
              "type": "chart",
              "expr": ["avg by (instance) (rate(node_cpu_seconds_total{mode=\"steal\"}[5m])) * 100"],
              "unit": "percent"
            }
          ]
        },
        {
          "title": "Node Memory",
          "panels": [
            {
              "title": "Memory Usage by Node",
              "type": "chart",
              "expr": ["node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes"],
              "unit": "bytes"
            },
            {
              "title": "Memory Usage % by Node",
              "type": "chart",
              "expr": ["(node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100"],
              "unit": "percent"
            }
          ]
        },
        {
          "title": "Node Disk",
          "panels": [
            {
              "title": "Disk Usage by Node (GB)",
              "type": "chart",
              "expr": ["(node_filesystem_size_bytes{mountpoint=\"/\"} - node_filesystem_avail_bytes{mountpoint=\"/\"}) / 1e9"]
            },
            {
              "title": "Disk Usage % by Node",
              "type": "chart",
              "expr": ["(node_filesystem_size_bytes{mountpoint=\"/\"} - node_filesystem_avail_bytes{mountpoint=\"/\"}) / node_filesystem_size_bytes{mountpoint=\"/\"} * 100"],
              "unit": "percent"
            }
          ]
        }
      ]
    }
